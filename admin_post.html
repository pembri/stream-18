<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Remaja 18</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #e50914; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; color: #b3b3b3; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #e50914; }
        button { background: #e50914; color: white; border: none; padding: 15px; width: 100%; margin-top: 25px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #b20710; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Post Video Baru</h2>
    <div id="statusBox" class="status"></div>

    <label>GitHub Token</label>
    <input type="password" id="ghToken" placeholder="ghp_xxx" required>

    <label>Repository (username/repo)</label>
    <input type="text" id="ghRepo" placeholder="pembri/remaja-18" required>

    <label>Judul Video</label>
    <input type="text" id="vidTitle" placeholder="Masukkan judul..." required>
    
    <label>Kategori</label>
    <input type="text" id="vidCategory" placeholder="Aksi, Pijat, dll" required>

    <label>Tipe Konten</label>
    <select id="vidType">
        <option value="embed">Embed Iframe</option>
        <option value="url">URL Video (.mp4)</option>
    </select>

    <label>Konten (Iframe atau Link)</label>
    <textarea id="vidContent" rows="5" placeholder="Paste di sini..." required></textarea>

    <button id="publishBtn" onclick="publishPost()">🚀 PUBLISH SEKARANG</button>
</div>

<script>
    function createSlug(text) {
        return text.toString().toLowerCase().trim()
            .replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-')
            .replace(/^-+/, '').replace(/-+$/, '');
    }

    function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
    function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

    async function publishPost() {
        const token = document.getElementById("ghToken").value;
        const repo = document.getElementById("ghRepo").value;
        const title = document.getElementById("vidTitle").value;
        const category = document.getElementById("vidCategory").value;
        const type = document.getElementById("vidType").value;
        const content = document.getElementById("vidContent").value;
        const slug = createSlug(title);
        const statusBox = document.getElementById("statusBox");

        statusBox.style.display = "block";
        statusBox.style.background = "#333";
        statusBox.innerText = "⏳ Menghubungkan ke GitHub...";

        try {
            // 1. Ambil database.js
            let dbUrl = `https://api.github.com/repos/${repo}/contents/database.js`;
            let dbRes = await fetch(dbUrl, { headers: { "Authorization": `token ${token}` }});
            if (!dbRes.ok) throw new Error("Gagal ambil database.js. Cek Repository & Token!");
            
            let dbData = await dbRes.json();
            let contentRaw = b64_to_utf8(dbData.content);
            
            // BERSIHKAN STRING BIAR JADI JSON MURNI
            let jsonClean = contentRaw.replace(/const\s+videoDB\s*=\s*/, "").replace(/;(?=[^;]*$)/, "").trim();
            let videoDB = JSON.parse(jsonClean || "[]");

            // 2. Tambah Video Baru
            videoDB.push({ slug, title, category, type, content, date: new Date().toISOString() });

            // 3. Update database.js
            statusBox.innerText = "⏳ Update Database...";
            await fetch(dbUrl, {
                method: 'PUT',
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Add: ${title}`,
                    content: utf8_to_b64(`const videoDB = ${JSON.stringify(videoDB, null, 4)};`),
                    sha: dbData.sha
                })
            });

            // 4. Buat Halaman Video (Clean URL)
            statusBox.innerText = "⏳ Membuat Halaman Video...";
            const htmlContent = `<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${title}</title><link rel="stylesheet" href="../../style.css"></head><body style="background:#121212;color:white;text-align:center;font-family:sans-serif;"><header style="padding:20px;border-bottom:1px solid #333;"><a href="/" style="color:#e50914;text-decoration:none;font-weight:bold;font-size:24px;">REMAJA 18</a></header><div style="max-width:800px;margin:20px auto;aspect-ratio:16/9;background:#000;">${type === 'embed' ? content : `<video controls src="${content}" style="width:100%;height:100%;"></video>`}</div><h1>${title}</h1><p>Kategori: ${category}</p><hr><a href="/" style="color:white;">Kembali ke Beranda</a><script src="../../database.js"><\/script></body></html>`;

            await fetch(`https://api.github.com/repos/${repo}/contents/content_video/${slug}/index.html`, {
                method: 'PUT',
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Page: ${title}`,
                    content: utf8_to_b64(htmlContent)
                })
            });

            statusBox.style.background = "#198754";
            statusBox.innerText = "✅ BERHASIL PUBLISH!";
        } catch (err) {
            statusBox.style.background = "#dc3545";
            statusBox.innerText = "❌ Error: " + err.message;
        }
    }
</script>
</body>
</html>
