<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Remaja 18</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Tambahan Khusus Admin */
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-red);
        }
        .btn {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: var(--transition);
        }
        .btn:hover {
            background: var(--accent-red-hover);
        }
        #log-area {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border-radius: 6px;
            font-family: monospace;
            color: #0f0;
            display: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="#" class="logo">REMAJA<span>18</span> - ADMIN PANEL</a>
            </div>
            <div class="nav-right">
                <button id="logout-btn" class="btn hidden" style="width:auto; padding: 8px 15px;">Logout</button>
            </div>
        </nav>
    </header>

    <main class="main-container">
        
        <div id="login-section" class="admin-container">
            <h2><i class="fas fa-key" style="color: var(--accent-red);"></i> Autentikasi GitHub</h2>
            <p style="color: var(--text-gray); margin-bottom: 20px;">Masukkan Personal Access Token GitHub kamu.</p>
            <div class="form-group">
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            </div>
            <button id="save-token-btn" class="btn">Simpan & Masuk</button>
        </div>

        <div id="dashboard-section" class="admin-container hidden">
            <h2><i class="fas fa-upload" style="color: var(--accent-red);"></i> Publish Video Baru</h2>
            
            <div class="form-group">
                <label>Judul Video</label>
                <input type="text" id="video-title" placeholder="Contoh: Cara Membuat Website">
            </div>

            <div class="form-group">
                <label>Kategori</label>
                <select id="video-category">
                    <option value="" disabled selected>Loading kategori...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Atau Kategori Baru (Opsional)</label>
                <input type="text" id="new-category" placeholder="Ketik kategori baru jika tidak ada di atas">
            </div>

            <div class="form-group">
                <label>URL Embed (YouTube)</label>
                <input type="text" id="embed-url" placeholder="https://www.youtube.com/embed/xxxxxxx">
            </div>

            <button id="publish-btn" class="btn"><i class="fas fa-rocket"></i> Publish ke GitHub</button>

            <div id="log-area"></div>
        </div>

    </main>

    <script>
        const REPO = 'pembri/remaja-18';
        
        // DOM Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const tokenInput = document.getElementById('github-token');
        const saveTokenBtn = document.getElementById('save-token-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const publishBtn = document.getElementById('publish-btn');
        const categorySelect = document.getElementById('video-category');
        const logArea = document.getElementById('log-area');

        let currentDatabase = [];
        let dbSha = '';

        // --- SISTEM AUTENTIKASI ---
        const checkAuth = () => {
            const token = localStorage.getItem('gh_token');
            if (token) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                fetchDatabase(); // Ambil data db saat ini
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        };

        saveTokenBtn.addEventListener('click', () => {
            if(tokenInput.value.trim() !== '') {
                localStorage.setItem('gh_token', tokenInput.value.trim());
                checkAuth();
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('gh_token');
            checkAuth();
        });

        // --- GITHUB API HELPER ---
        async function ghFetch(path, method = 'GET', body = null) {
            const token = localStorage.getItem('gh_token');
            const options = {
                method,
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, options);
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            return res.json();
        }

        // --- LOGIKA DATABASE ---
        async function fetchDatabase() {
            try {
                logMsg("Membaca database.js dari GitHub...");
                const data = await ghFetch('database.js');
                dbSha = data.sha; // Simpan SHA untuk keperluan update
                
                // Decode base64 dari GitHub
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                
                // Parsing format 'window.videoDatabase = [...]' menjadi JSON Object
                const jsonString = decodedContent.replace('window.videoDatabase = ', '').replace(/;$/, '').trim();
                currentDatabase = JSON.parse(jsonString);
                
                // Load kategori ke dropdown
                const categories = [...new Set(currentDatabase.map(v => v.category))];
                categorySelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
                logMsg("Database siap!");
            } catch (err) {
                logMsg("Gagal membaca database. Pastikan token benar dan repositori ada.", true);
                console.error(err);
            }
        }

        // Ekstrak ID Youtube
        function getYoutubeId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
            return match ? match[1] : null;
        }

        // Logger Function
        function logMsg(msg, isError = false) {
            logArea.style.display = 'block';
            logArea.style.color = isError ? 'var(--accent-red)' : '#0f0';
            logArea.innerHTML += `> ${msg}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- LOGIKA PUBLISH ---
        publishBtn.addEventListener('click', async () => {
            const title = document.getElementById('video-title').value.trim();
            const newCat = document.getElementById('new-category').value.trim();
            const selectedCat = categorySelect.value;
            const embedUrl = document.getElementById('embed-url').value.trim();

            const category = newCat !== '' ? newCat : selectedCat;

            if (!title || !embedUrl) {
                alert("Judul dan URL Embed wajib diisi!");
                return;
            }

            const ytId = getYoutubeId(embedUrl);
            if (!ytId) {
                alert("Format URL YouTube tidak valid!");
                return;
            }

            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            logArea.innerHTML = '';

            try {
                // 1. Siapkan Data Baru
                const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                const thumbnail = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
                const embedBase64 = btoa(embedUrl); // Sembunyikan URL
                const id = Date.now().toString();
                const today = new Date().toISOString().split('T')[0];

                const newVideoObj = { id, title, slug, category, thumbnail, embedBase64, date: today };

                // 2. Update Array Database
                currentDatabase.push(newVideoObj);
                const updatedDbText = 'window.videoDatabase = ' + JSON.stringify(currentDatabase, null, 4) + ';';
                const base64Db = btoa(unescape(encodeURIComponent(updatedDbText)));

                logMsg("Menyimpan database.js ke GitHub...");
                // Push Database ke Github
                await ghFetch('database.js', 'PUT', {
                    message: `Auto-publish: Tambah video ${title}`,
                    content: base64Db,
                    sha: dbSha
                });
                logMsg("Database berhasil diupdate.");

                // 3. Generate Template Halaman Video (index.html di dalam folder)
                logMsg(`Membangun halaman video: /content_video/${slug}/index.html ...`);
                const videoHtmlTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - Remaja 18</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="../../index" class="logo">REMAJA<span>18</span></a>
            </div>
        </nav>
    </header>
    <main class="main-container" style="max-width: 1000px; margin: 85px auto;">
        <div style="background:var(--bg-card); padding:10px; border-radius:12px; margin-bottom:30px;">
            <div class="thumbnail-wrap" id="video-container">
                </div>
            <div class="video-info" style="padding:20px;">
                <span class="category-tag">${category}</span>
                <h1 style="font-size:1.5rem; margin-top:10px;">${title}</h1>
            </div>
        </div>

        <h2><i class="fas fa-fire" style="color:var(--accent-red);"></i> Rekomendasi Lainnya</h2>
        <div id="related-grid" class="video-grid"></div>
    </main>

    <script src="../../database.js"><\/script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Decode dan Tampilkan Video
            const embedB64 = "${embedBase64}";
            const iframeSrc = atob(embedB64);
            document.getElementById('video-container').innerHTML = \`<iframe style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;" src="\${iframeSrc}" allowfullscreen></iframe>\`;

            // 2. Render 5 Rekomendasi
            const allVids = window.videoDatabase || [];
            // Ambil 5 video secara acak yang bukan video saat ini
            const related = allVids.filter(v => v.slug !== "${slug}").sort(() => 0.5 - Math.random()).slice(0, 5);
            
            const grid = document.getElementById('related-grid');
            related.forEach(v => {
                grid.innerHTML += \`
                    <a href="../\${v.slug}" class="video-card">
                        <div class="thumbnail-wrap">
                            <img src="\${v.thumbnail}" alt="\${v.title}">
                        </div>
                        <div class="video-info">
                            <span class="category-tag">\${v.category}</span>
                            <h3>\${v.title}</h3>
                        </div>
                    </a>
                \`;
            });
        });
    <\/script>
</body>
</html>`;

                const base64Html = btoa(unescape(encodeURIComponent(videoHtmlTemplate)));

                // Push File Halaman Video ke Github
                await ghFetch(`content_video/${slug}/index.html`, 'PUT', {
                    message: `Auto-publish: Generate halaman ${slug}`,
                    content: base64Html
                });

                logMsg("Halaman video berhasil dibuat!");
                logMsg(`<b>SUKSES!</b> Video "${title}" telah dipublish.`);
                
                // Reset form
                document.getElementById('video-title').value = '';
                document.getElementById('new-category').value = '';
                document.getElementById('embed-url').value = '';
                
                // Refresh Db reference
                await fetchDatabase();

            } catch (err) {
                logMsg("Terjadi kesalahan saat upload. Cek Console browser.", true);
                console.error(err);
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fas fa-rocket"></i> Publish ke GitHub';
            }
        });

        // Jalankan saat load
        checkAuth();
    </script>
</body>
</html>
