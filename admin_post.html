<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Remaja 18 (Universal)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Admin Panel */
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-gray); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: white; border-radius: 6px; outline: none;
        }
        .form-group input:focus { border-color: var(--accent-red); }
        .btn {
            background: var(--accent-red); color: white; border: none;
            padding: 12px 24px; border-radius: 6px; cursor: pointer;
            font-weight: bold; width: 100%; transition: var(--transition);
        }
        .btn:hover { background: var(--accent-red-hover); }
        #log-area {
            margin-top: 20px; padding: 15px; background: #111;
            border-radius: 6px; font-family: monospace; color: #0f0;
            display: none; height: 150px; overflow-y: auto; font-size: 0.85rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="#" class="logo">REMAJA<span>18</span> - ADMIN PANEL</a>
            </div>
            <div class="nav-right">
                <button id="logout-btn" class="btn hidden" style="width:auto; padding: 8px 15px;">Logout</button>
            </div>
        </nav>
    </header>

    <main class="main-container">
        <div id="login-section" class="admin-container">
            <h2><i class="fas fa-key" style="color: var(--accent-red);"></i> Autentikasi GitHub</h2>
            <p style="color: var(--text-gray); margin-bottom: 20px;">Masukkan Personal Access Token GitHub kamu.</p>
            <div class="form-group">
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            </div>
            <button id="save-token-btn" class="btn">Simpan & Masuk</button>
        </div>

        <div id="dashboard-section" class="admin-container hidden">
            <h2><i class="fas fa-upload" style="color: var(--accent-red);"></i> Publish Video Universal</h2>
            
            <div class="form-group">
                <label>Judul Video</label>
                <input type="text" id="video-title" placeholder="Contoh: Video Streaming Baru">
            </div>

            <div class="form-group">
                <label>Kategori</label>
                <select id="video-category">
                    <option value="" disabled selected>Loading kategori...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tambah Kategori Baru (Opsional)</label>
                <input type="text" id="new-category" placeholder="Ketik jika ingin membuat kategori baru">
            </div>

            <div class="form-group">
                <label>URL Video / Embed (MP4, YouTube, atau Iframe Link)</label>
                <input type="text" id="embed-url" placeholder="Paste link video atau embed di sini">
            </div>

            <div class="form-group">
                <label>URL Thumbnail (Gambar Cover)</label>
                <input type="text" id="thumb-url" placeholder="Paste link gambar .jpg / .png">
                <small style="color:var(--text-gray);">*Otomatis jika menggunakan link YouTube.</small>
            </div>

            <button id="publish-btn" class="btn"><i class="fas fa-rocket"></i> Publish ke GitHub</button>

            <div id="log-area"></div>
        </div>
    </main>

    <script>
        const REPO = 'pembri/remaja-18';
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const tokenInput = document.getElementById('github-token');
        const saveTokenBtn = document.getElementById('save-token-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const publishBtn = document.getElementById('publish-btn');
        const categorySelect = document.getElementById('video-category');
        const logArea = document.getElementById('log-area');

        let currentDatabase = [];
        let dbSha = '';

        // --- SISTEM LOGIN ---
        const checkAuth = () => {
            const token = localStorage.getItem('gh_token');
            if (token) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                fetchDatabase(); 
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        };

        saveTokenBtn.addEventListener('click', () => {
            const tk = tokenInput.value.trim();
            if(tk !== '') {
                localStorage.setItem('gh_token', tk);
                checkAuth();
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('gh_token');
            location.reload();
        });

        // --- GITHUB HELPER ---
        async function ghFetch(path, method = 'GET', body = null) {
            const token = localStorage.getItem('gh_token');
            const options = {
                method,
                headers: {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, options);
            if (!res.ok) throw new Error('HTTP Error: ' + res.status);
            return res.json();
        }

        async function fetchDatabase() {
            try {
                logMsg("Membaca database...");
                const data = await ghFetch('database.js');
                dbSha = data.sha;
                const decoded = decodeURIComponent(escape(atob(data.content)));
                const jsonStr = decoded.replace('window.videoDatabase = ', '').replace(/;$/, '').trim();
                currentDatabase = JSON.parse(jsonStr);
                const categories = [...new Set(currentDatabase.map(v => v.category))];
                categorySelect.innerHTML = categories.map(c => '<option value="' + c + '">' + c + '</option>').join('');
                logMsg("Database OK.");
            } catch (err) {
                logMsg("Gagal baca database!", true);
            }
        }

        function getYoutubeId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
            return match ? match[1] : null;
        }

        function logMsg(msg, isError = false) {
            logArea.style.display = 'block';
            logArea.style.color = isError ? 'var(--accent-red)' : '#0f0';
            logArea.innerHTML += '> ' + msg + '<br>';
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- PUBLISH LOGIC ---
        publishBtn.addEventListener('click', async () => {
            const title = document.getElementById('video-title').value.trim();
            const newCat = document.getElementById('new-category').value.trim();
            const embedUrl = document.getElementById('embed-url').value.trim();
            const manualThumb = document.getElementById('thumb-url').value.trim();
            const category = newCat !== '' ? newCat : categorySelect.value;

            if (!title || !embedUrl) {
                alert("Isi judul dan link video!");
                return;
            }

            publishBtn.disabled = true;
            publishBtn.innerHTML = 'Memproses...';
            logArea.innerHTML = '';

            try {
                // Tentukan Thumbnail
                let thumbnail = manualThumb;
                const ytId = getYoutubeId(embedUrl);
                if (ytId && !manualThumb) {
                    thumbnail = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
                } else if (!manualThumb) {
                    alert("Untuk link selain YouTube, URL Thumbnail wajib diisi!");
                    publishBtn.disabled = false;
                    return;
                }

                const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                const embedBase64 = btoa(unescape(encodeURIComponent(embedUrl)));
                const id = Date.now().toString();
                const today = new Date().toISOString().split('T')[0];

                // 1. Update Database
                currentDatabase.push({ id, title, slug, category, thumbnail, embedBase64, date: today });
                const dbText = 'window.videoDatabase = ' + JSON.stringify(currentDatabase, null, 4) + ';';
                const base64Db = btoa(unescape(encodeURIComponent(dbText)));
                
                logMsg("Mengupdate database...");
                await ghFetch('database.js', 'PUT', { message: 'Tambah: ' + title, content: base64Db, sha: dbSha });

                // 2. Buat Halaman HTML Universal
                const htmlTemplate = '<!DOCTYPE html>\n' +
'<html lang="id">\n' +
'<head>\n' +
'    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
'    <title>' + title + ' - Remaja 18</title>\n' +
'    <link rel="stylesheet" href="../../style.css">\n' +
'    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">\n' +
'</head>\n' +
'<body>\n' +
'    <header>\n' +
'        <nav class="navbar">\n' +
'            <div class="nav-left">\n' +
'                <button class="hamburger" id="menu-btn"><i class="fas fa-bars"></i></button>\n' +
'                <a href="../../index" class="logo">REMAJA<span>18</span></a>\n' +
'            </div>\n' +
'            <div class="nav-center">\n' +
'                <div class="search-box">\n' +
'                    <input type="text" id="search-input" placeholder="Cari video...">\n' +
'                    <button><i class="fas fa-search"></i></button>\n' +
'                </div>\n' +
'            </div>\n' +
'        </nav>\n' +
'    </header>\n' +
'\n' +
'    <aside class="sidebar" id="sidebar">\n' +
'        <div class="sidebar-header"><h3>Menu</h3><button id="close-btn"><i class="fas fa-times"></i></button></div>\n' +
'        <ul class="category-list"><li><a href="../../index">Semua Video</a></li></ul>\n' +
'    </aside>\n' +
'    <div class="overlay" id="overlay"></div>\n' +
'\n' +
'    <main class="main-container" style="max-width:1100px; margin: 90px auto; padding: 0 15px;">\n' +
'        <div style="background:var(--bg-card); border-radius:12px; overflow:hidden; margin-bottom:40px; padding:10px;">\n' +
'            <div id="video-container" class="thumbnail-wrap" style="position:relative; background:#000;"></div>\n' +
'            <div style="padding:20px;">\n' +
'                <span class="category-tag">' + category + '</span>\n' +
'                <h1 style="font-size:1.6rem; margin-top:10px;">' + title + '</h1>\n' +
'            </div>\n' +
'        </div>\n' +
'\n' +
'        <h2 style="margin-bottom:20px;"><i class="fas fa-fire" style="color:var(--accent-red);"></i> Rekomendasi Lainnya</h2>\n' +
'        <div id="related-grid" class="video-grid"></div>\n' +
'    </main>\n' +
'\n' +
'    <footer><div class="footer-content"><p>&copy; 2026 <strong>Remaja 18</strong>. Semua Hak Cipta Dilindungi.</p></div></footer>\n' +
'\n' +
'    <script src="../../database.js"><\/script>\n' +
'    <script>\n' +
'        document.addEventListener("DOMContentLoaded", () => {\n' +
'            // 1. Decode URL\n' +
'            const rawUrl = decodeURIComponent(escape(atob("' + embedBase64 + '")));\n' +
'            const container = document.getElementById("video-container");\n' +
'\n' +
'            // 2. Auto-Detect Player (Video vs Iframe)\n' +
'            if (rawUrl.match(/\\.(mp4|webm|ogg|m4v)(\\?.*)?$/i)) {\n' +
'                container.innerHTML = `<video controls style="position:absolute; top:0; left:0; width:100%; height:100%;"><source src="${rawUrl}" type="video/mp4"></video>`;\n' +
'            } else {\n' +
'                container.innerHTML = `<iframe src="${rawUrl}" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;" allowfullscreen></iframe>`;\n' +
'            }\n' +
'\n' +
'            // 3. Sidebar Logic\n' +
'            const menuBtn = document.getElementById("menu-btn");\n' +
'            const closeBtn = document.getElementById("close-btn");\n' +
'            const sidebar = document.getElementById("sidebar");\n' +
'            const overlay = document.getElementById("overlay");\n' +
'            menuBtn.onclick = () => { sidebar.classList.add("active"); overlay.classList.add("active"); };\n' +
'            const hideSide = () => { sidebar.classList.remove("active"); overlay.classList.remove("active"); };\n' +
'            closeBtn.onclick = hideSide; overlay.onclick = hideSide;\n' +
'\n' +
'            // 4. Rekomendasi 5 Video Acak\n' +
'            const allVids = window.videoDatabase || [];\n' +
'            const related = allVids.filter(v => v.slug !== "' + slug + '").sort(() => 0.5 - Math.random()).slice(0, 5);\n' +
'            const grid = document.getElementById("related-grid");\n' +
'            related.forEach(v => {\n' +
'                grid.innerHTML += `<a href="../${v.slug}" class="video-card"><div class="thumbnail-wrap"><img src="${v.thumbnail}"></div><div class="video-info"><span class="category-tag">${v.category}</span><h3>${v.title}</h3></div></a>`;\n' +
'            });\n' +
'        });\n' +
'    <\/script>\n' +
'</body>\n' +
'</html>';

                const base64Html = btoa(unescape(encodeURIComponent(htmlTemplate)));
                logMsg("Membuat halaman video...");
                await ghFetch("content_video/" + slug + "/index.html", 'PUT', { message: 'Gen: ' + slug, content: base64Html });

                logMsg("SUKSES! Video telah dipublish.");
                fetchDatabase(); // Refresh local DB
            } catch (err) {
                logMsg("Error: " + err.message, true);
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fas fa-rocket"></i> Publish ke GitHub';
            }
        });

        checkAuth();
    </script>
</body>
</html>
