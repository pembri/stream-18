<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAM 18 - Nonton Video Streaming Gratis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header id="mainHeader">
        <a href="index.html" class="logo">STREAM 18</a>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Cari film, kategori, atau genre...">
        </div>

        <div class="nav-actions">
            <div class="hamburger" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <nav class="menu-overlay" id="menuOverlay">
        <div class="close-menu" id="closeMenuBtn">&times;</div>
        <ul>
            <li><a href="/index"><i class="fas fa-home"></i> Beranda</a></li>
            <li>
                <a href="/index#categoryFilter"><i class="fas fa-list"></i> List Category</a>
                <!-- List Kategori akan otomatis muncul di sini -->
                <ul id="mobileCategoryList" style="margin-left: 30px; margin-top: 15px; list-style: none;"></ul>
            </li>
            <li><a href="/about"><i class="fas fa-info-circle"></i> About</a></li>
            <li><a href="/privacy"><i class="fas fa-shield-alt"></i> Privacy Policy</a></li>
            <li><a href="/admin"><i class="fas fa-user-shield"></i> Admin Panel</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-title">
            <h2 id="viewTitle">Terbaru di Upload</h2>
        </div>

        <div class="filter-tags" id="categoryFilter">
            <!-- Diisi database.js -->
        </div>

        <div class="video-grid" id="videoGrid">
            <div style="color: #555;">Memuat konten...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="admin.html">Admin</a>
        </div>
        <p class="copyright">&copy; 2026 STREAM 18. All Rights Reserved.</p>
    </footer>

    <script src="database.js"></script>
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const header = document.getElementById('mainHeader');

        // Buka & Tutup Menu Hamburger
        menuToggle.addEventListener('click', () => menuOverlay.classList.add('active'));
        closeMenuBtn.addEventListener('click', () => menuOverlay.classList.remove('active'));

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        // Script URL Clean (Tanpa akhiran .html)
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if (href && href.endsWith('.html')) {
                    e.preventDefault();
                    window.location.href = href.replace('.html', '');
                }
            });
        });
    </script>
</body>
</html>
