<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remaja 18 - Situs Streaming Video</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <button id="menu-toggle" class="hamburger" aria-label="Menu Kategori">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="index" class="logo">REMAJA<span>18</span></a>
            </div>

            <div class="nav-center">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Cari video favoritmu...">
                    <button id="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="nav-right">
                </div>
        </nav>
    </header>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Kategori</h3>
            <button id="close-menu"><i class="fas fa-times"></i></button>
        </div>
        <ul id="category-list">
            </ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="main-container">
        <section id="video-section">
            <h2 id="section-title"><i class="fas fa-bolt" style="color: var(--accent-red);"></i> Video Terbaru</h2>
            
            <div id="video-grid" class="video-grid">
                </div>

            <div id="loading-trigger" class="loading-area">
                <div class="spinner"></div>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="footer-content">
            <p>&copy; 2026 <span class="red-text">Remaja 18</span>. All Rights Reserved.</p>
            <div class="footer-links">
                <a href="#">Tentang Kami</a>
                <a href="#">DMCA</a>
                <a href="#">Kontak</a>
            </div>
        </div>
    </footer>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
