
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAM 18 - Nonton Video Streaming Gratis</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header id="mainHeader">
        <a href="/" class="logo">STREAM 18</a>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Cari film, kategori, atau genre...">
        </div>

        <div class="nav-actions">
            <div class="hamburger" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Overlay Menu -->
    <nav class="menu-overlay" id="menuOverlay">
        <ul>
            <li><a href="/"><i class="fas fa-home"></i> Beranda</a></li>
            <li><a href="#" id="showCategories"><i class="fas fa-list"></i> List Category</a></li>
            <li><a href="/about"><i class="fas fa-info-circle"></i> About</a></li>
            <li><a href="/privacy-policy"><i class="fas fa-shield-alt"></i> Privacy Policy</a></li>
            <li><a href="/admin"><i class="fas fa-user-shield"></i> Admin Panel</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="section-title">
            <h2 id="viewTitle">Terbaru di Upload</h2>
        </div>

        <!-- Category Filter -->
        <div class="filter-tags" id="categoryFilter">
            <div class="tag active" data-category="all">Semua</div>
            <!-- Kategori akan diisi otomatis dari database.js -->
        </div>

        <!-- Video List Grid -->
        <div class="video-grid" id="videoGrid">
            <!-- Loading state or fallback -->
            <div style="color: #555;">Memuat konten...</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- Dihasilkan oleh JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/privacy-policy">Privacy Policy</a>
            <a href="/admin">Admin</a>
        </div>
        <p class="copyright">&copy; 2026 STREAM 18. All Rights Reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="database.js"></script>
    <script>
        // UI Logic untuk Index
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const header = document.getElementById('mainHeader');

        // Toggle Hamburger Menu
        menuToggle.addEventListener('click', () => {
            menuOverlay.classList.toggle('active');
            const spans = menuToggle.querySelectorAll('span');
            spans[0].style.transform = menuOverlay.classList.contains('active') ? 'rotate(45deg) translate(5px, 5px)' : 'none';
            spans[1].style.opacity = menuOverlay.classList.contains('active') ? '0' : '1';
            spans[2].style.transform = menuOverlay.classList.contains('active') ? 'rotate(-45deg) translate(7px, -6px)' : 'none';
        });

        // Header scroll effect
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Global function to clean URL in navigation
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if (href && href.endsWith('.html')) {
                    e.preventDefault();
                    const cleanUrl = href.replace('.html', '');
                    window.location.href = cleanUrl;
                }
            });
        });

        // Note: Logika filtering, search, dan pagination akan diletakkan di main app logic 
        // yang terhubung dengan database.js nantinya.
    </script>
</body>
</html>
