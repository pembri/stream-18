<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>STREAM 18 - Premium Video Streaming</title> 
     
    <!-- SEO & Metadata --> 
    <meta name="description" content="Watch the latest premium videos on STREAM 18. High-quality streaming across all categories."> 
    <link rel="canonical" href="https://stream18.musikanywhere.online"> 
 
    <!-- CSS --> 
    <link rel="stylesheet" href="/assets/css/style.css"> 
     
    <!-- Database and App Logic --> 
    <script src="/database.js"></script> 
    <script src="/assets/js/app.js" defer></script> 
</head> 
<body> 
 
    <!-- Content Area --> 
    <main class="container"> 
        <div id="categoryHeader" style="margin-bottom: 20px;"> 
            <h2 id="viewTitle" style="border-left: 5px solid var(--primary-red); padding-left: 15px; text-transform: uppercase;">Latest Uploads</h2> 
        </div> 
 
        <!-- The video grid where app.js will render the cards --> 
        <div class="video-grid" id="videoGrid"> 
            <!-- Dynamic content loads here --> 
            <div class="loading-state" style="grid-column: 1/-1; text-align: center; padding: 50px;"> 
                <p>Loading videos...</p> 
            </div> 
        </div> 
 
        <!-- Pagination is injected here by app.js --> 
    </main> 
 
    <!-- Script to handle small UI triggers for index specifically --> 
    <script> 
        // Placeholder for any index-specific triggers 
        window.addEventListener('DOMContentLoaded', () => { 
            console.log("STREAM 18 Index Initialized."); 
        }); 
    </script> 
 
</body> 
</html>
