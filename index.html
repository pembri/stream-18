<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAM 18 - Nonton Video Streaming Tanpa Batas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header id="main-header">
        <a href="/index" class="logo">STREAM 18</a>
        <div class="header-right">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Cari judul atau kategori...">
            </div>
            <button id="hamburger-btn" class="hamburger-btn">&#9776;</button>
        </div>
    </header>

    <div id="overlay" class="overlay"></div>
    <aside id="sidebar" class="sidebar">
        <button id="close-btn" class="close-btn">&times;</button>
        
        <h3>Navigasi</h3>
        <ul>
            <li><a href="/index">Beranda</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/privacy">Privacy Policy</a></li>
        </ul>

        <h3>Kategori</h3>
        <ul id="category-list-sidebar">
            <li><a href="/index">Semua Video</a></li>
            <li><a href="#">Musik</a></li>
            <li><a href="#">Film Pendek</a></li>
            <li><a href="#">Podcast</a></li>
            <li><a href="#">Pencak Silat</a></li>
            <li><a href="#">Olahraga</a></li>
        </ul>
    </aside>

    <main>
        <h1 class="section-title">Video Terbaru</h1>
        
        <div id="video-grid" class="video-grid">
            </div>
        
        <div class="pagination">
            <button id="load-more" class="btn" style="display: none;">Muat Lebih Banyak</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 STREAM 18. Hak Cipta Dilindungi.</p>
        <p style="margin-top: 10px; font-size: 12px;"><a href="/admin" style="color: var(--accent-red);">Login Admin Panel</a></p>
    </footer>

    <script src="database.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
