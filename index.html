<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remaja 18 - Streaming Video Premium</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <div class="left-header">
            <div class="hamburger" id="hamburgerMenu">☰</div>
            <a href="/" class="logo">REMAJA <span>18</span></a>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari judul video...">
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <div class="close-menu" id="closeMenu">&times;</div>
        <h3>Kategori</h3>
        <div class="category-list" id="categoryList">
            <button>Memuat kategori...</button>
        </div>
    </div>

    <main>
        <div class="video-grid" id="videoGrid">
            </div>
        
        <div class="pagination" id="paginationContainer">
            <button id="loadMoreBtn" style="display: none;">Muat Lebih Banyak</button>
        </div>
    </main>

    <script src="./database.js"></script>
    <script src="./app.js"></script>
</body>
</html>
