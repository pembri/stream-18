<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remaja 18 - Streaming Video</title>
<meta name="description" content="Situs streaming Remaja 18 - tonton video terbaru gratis">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <button id="hamburgerBtn" class="hamburger" aria-label="Menu">☰</button>
  <h1 class="logo">Remaja <span>18</span></h1>
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Cari video...">
    <button id="searchBtn">🔍</button>
  </div>
</header>

<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>Kategori</h3>
    <button id="closeSidebar">✕</button>
  </div>
  <ul id="categoryList" class="category-list">
    <li data-cat="all" class="active">Semua Video</li>
  </ul>
</aside>
<div id="overlay" class="overlay"></div>

<main class="main">
  <h2 id="pageTitle">Video Terbaru</h2>
  <div id="videoGrid" class="video-grid"></div>
  <div id="pagination" class="pagination"></div>
</main>

<footer class="footer">
  <p>© 2026 Remaja 18 - All Rights Reserved</p>
</footer>

<script src="database.js"></script>
<script src="app.js"></script>
</body>
</html>
