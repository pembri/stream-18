<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Tidak Ditemukan - STREAM 18</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 80px 20px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-container h1 {
            font-size: 6rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .error-container p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 500px;
        }
        .btn-home {
            background: var(--accent-color);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <main>
        <div class="error-container">
            <h1>404</h1>
            <p>Waduh! Halaman atau video yang kamu cari sepertinya tidak ada, sudah dihapus, atau URL-nya salah.</p>
            <a href="/" class="btn-home">Kembali ke Beranda</a>
        </div>
    </main>
    
    <script src="/assets/js/app.js"></script>
</body>
</html>
