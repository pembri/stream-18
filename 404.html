<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - STREAM 18</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">STREAM <span>18</span></a>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Cari film, series, anime..." onkeypress="if(event.key === 'Enter') window.location.href='/?search=' + encodeURIComponent(this.value);">
            </div>
            <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        </nav>
    </header>

    <div class="nav-links" id="navLinks">
        <div style="text-align: right; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <i class="fas fa-times" onclick="toggleMenu()" style="cursor: pointer; font-size: 24px;"></i>
        </div>
        <a href="/"><i class="fas fa-home"></i> Home</a>
        <div class="cat-header">PAGES</div>
        <a href="/about"><i class="fas fa-info-circle"></i> About</a>
        <a href="/privacy"><i class="fas fa-shield-alt"></i> Privacy Policy</a>
    </div>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
        <div style="text-align: center;">
            <h1 style="font-size: 80px; color: var(--accent); margin-bottom: 10px;">404</h1>
            <h2 style="margin-bottom: 20px;">Halaman Tidak Ditemukan</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Sepertinya Anda tersesat. Halaman yang Anda cari tidak ada atau sudah dihapus.</p>
            <a href="/" class="btn-primary" style="text-decoration: none;"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 STREAM 18. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
        
        // Smart Redirect (Jika user ketik link video format lama, diarahin ke format baru /?v=slug)
        let path = window.location.pathname;
        if (path.includes('/content_video/')) {
            let slug = path.split('/').pop().replace('.html', '');
            window.location.replace('/?v=' + slug);
        }
    </script>
</body>
</html>
