<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="utf-8"> 
    <title>STREAM 18 - Redirecting...</title> 
    <script type="text/javascript"> 
        // Single Page Apps for GitHub Pages 
        // This script takes the current URL and converts it into a query string 
        // so that index.html can load the correct content. 
        var pathSegmentsToKeep = 0; 
 
        var l = window.location; 
        l.replace( 
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + 
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' + 
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') + 
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + 
            l.hash 
        ); 
    </script> 
</head> 
<body> 
    <div style="background:#0a0a0a; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;"> 
        <p>Loading <span style="color:red">STREAM 18</span> content...</p> 
    </div> 
</body> 
</html>
