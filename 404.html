<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found - STREAM 18</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1;
            text-shadow: 0 0 30px rgba(0, 123, 255, 0.3);
        }
        .error-msg {
            font-size: 1.5rem;
            margin: 20px 0 40px;
            color: var(--text-muted);
        }
        .back-home {
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 4px;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-home:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <main class="error-container">
        <div class="error-code">404</div>
        <div class="error-msg">Oops! The page you're looking for disappeared into the void.</div>
        <a href="/" class="back-home">Back to Homepage</a>
    </main>

    <footer style="border-top: none;">
        <p class="copyright">&copy; 2026 STREAM 18. All Rights Reserved.</p>
    </footer>

</body>
</html>
