<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>404 - Remaja 18</title>
<link rel="stylesheet" href="/style.css">
<script>
// Redirect handler untuk clean URL
const path = location.pathname;
// Kalau URL berakhir tanpa slash, coba tambah slash
if (path.startsWith('/content_video/') && !path.endsWith('/') && !path.endsWith('.html')) {
  location.replace(path + '/');
}
</script>
</head>
<body>
<div style="text-align:center;padding:80px 20px">
  <h1 style="font-size:80px;color:#a020f0;margin:0">404</h1>
  <h2>Halaman tidak ditemukan</h2>
  <p style="color:#888;margin:20px 0">Video yang kamu cari mungkin sudah dihapus atau URL salah.</p>
  <a href="/" style="display:inline-block;background:linear-gradient(135deg,#a020f0,#e91e63);color:#fff;padding:12px 30px;border-radius:25px;text-decoration:none;margin-top:20px">← Kembali ke Beranda</a>
</div>
</body>
</html>
