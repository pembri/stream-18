<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukhti Berjilbab Sudah Berani Main Ngentot di Kantor - Remaja 18</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <header><nav class="navbar"><div class="nav-left"><a href="../../index" class="logo">REMAJA<span>18</span></a></div></nav></header>
    <main class="main-container" style="max-width: 1000px; margin: 85px auto; padding: 0 15px;">
        <div style="background:var(--bg-card); border-radius:12px; overflow:hidden;">
            <div id="player-container" style="position:relative; padding-top:56.25%; background:#000;"></div>
            <div style="padding:20px;">
                <span class="category-tag">Bokep AI</span>
                <h1 style="font-size:1.5rem; margin-top:10px;">Ukhti Berjilbab Sudah Berani Main Ngentot di Kantor</h1>
            </div>
        </div>
    </main>
    <script>
        const rawUrl = decodeURIComponent(escape(atob("aHR0cHM6Ly90djEuaW5kb2F2LmFwcC9lL0dVUWZSc0xvYWdnUQ==")));
        const container = document.getElementById("player-container");
        if (rawUrl.match(/\.(mp4|webm|ogg|m4v)(\?.*)?$/i)) {
            container.innerHTML = `<video controls style="position:absolute; top:0; left:0; width:100%; height:100%;"><source src="${rawUrl}" type="video/mp4"></video>`;
        } else {
            container.innerHTML = `<iframe src="${rawUrl}" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
