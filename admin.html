<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - STREAM 18</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: var(--bg-main); }
        .admin-box { max-width: 1100px; margin: 120px auto 50px; padding: 20px; }
        .card { background: var(--bg-surface); border-radius: 12px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; }
        .form-group input:focus { border-color: var(--accent); outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { color: var(--accent); }
        .action-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px;}
        .action-btn.del { border-color: #e74c3c; color: #e74c3c; }
        .btn-submit { width: 100%; }
        .hidden { display: none; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .alert.success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .alert.error { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">STREAM <span>18</span> | ADMIN</a>
            <div id="logoutMenu" class="hidden">
                <button onclick="logout()" style="background:transparent; color:#e74c3c; border:1px solid #e74c3c; padding:8px 15px; border-radius:20px; cursor:pointer;">Logout</button>
            </div>
        </nav>
    </header>

    <div class="admin-box">
        <div id="alertBox" class="alert hidden"></div>

        <div class="card" id="loginSec">
            <h2>Login GitHub Token</h2>
            <p style="color:var(--text-muted); margin: 10px 0 20px;">Masukkan PAT (scope: repo) untuk akses CRUD.</p>
            <div class="form-group"><input type="password" id="ghToken" placeholder="ghp_xxxxxx"></div>
            <button class="btn-primary btn-submit" onclick="login()">Masuk</button>
        </div>

        <div id="dashSec" class="hidden">
            <div class="card">
                <h2 style="color: var(--accent); border-bottom: 1px solid var(--border-color); padding-bottom:10px; margin-bottom: 20px;">
                    <i class="fas fa-video"></i> Manajemen Video
                </h2>
                <input type="hidden" id="editVidId" value="">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Judul Video</label>
                        <input type="text" id="vTitle" oninput="autoSlug()" placeholder="Judul">
                    </div>
                    <div class="form-group">
                        <label>Slug URL</label>
                        <input type="text" id="vSlug" readonly style="background:#000;">
                    </div>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="vCat"></select>
                </div>
                <div class="form-group">
                    <label>URL Video (Embed YT/DM, MP4, M3U8)</label>
                    <input type="text" id="vUrl" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Thumbnail URL</label>
                    <input type="text" id="vThumb" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="vDesc" rows="2"></textarea>
                </div>
                <button class="btn-primary btn-submit" id="btnSaveVid" onclick="saveVideo()">Tambah / Update Video</button>

                <div style="margin-top: 30px; overflow-x: auto;">
                    <table>
                        <thead><tr><th>Judul</th><th>Kategori</th><th>Aksi</th></tr></thead>
                        <tbody id="vidTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2 style="color: #f39c12; border-bottom: 1px solid var(--border-color); padding-bottom:10px; margin-bottom: 20px;">
                    <i class="fas fa-layer-group"></i> Manajemen Kategori
                </h2>
                <div style="display: flex; gap: 10px;">
                    <input type="hidden" id="editCatId" value="">
                    <input type="text" id="cId" placeholder="ID (cth: action)" style="flex:1; padding:10px; border-radius:5px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--border-color);">
                    <input type="text" id="cName" placeholder="Nama Kategori (cth: Action Movies)" style="flex:2; padding:10px; border-radius:5px; background:rgba(0,0,0,0.3); color:#fff; border:1px solid var(--border-color);">
                    <button class="btn-primary" onclick="saveCategory()" style="background:#f39c12;">Simpan</button>
                </div>
                <table style="margin-top:20px;">
                    <thead><tr><th>ID</th><th>Nama Kategori</th><th>Aksi</th></tr></thead>
                    <tbody id="catTableBody"></tbody>
                </table>
            </div>

             <div class="card" style="text-align: center; border-color: #2ecc71;">
                <h2 style="color:#2ecc71; margin-bottom: 15px;">PUBLISH PERUBAHAN</h2>
                <p style="color:var(--text-muted); margin-bottom:20px;">Setelah Anda Menambah/Edit/Hapus, klik tombol ini untuk menyimpan permanen ke GitHub.</p>
                <button class="btn-primary btn-submit" id="btnPush" onclick="pushToGitHub()" style="background:#2ecc71; font-size:16px;">🚀 COMMIT & PUSH KE REPO</button>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const REPO_OWNER = "pembri";
        const REPO_NAME = "stream-18";
        const BRANCH = "main";
        let token = localStorage.getItem('s18_token') || "";
        
        // Buat clone lokal database untuk diedit sebelum di push
        let localDB = JSON.parse(JSON.stringify(streamDB));

        window.onload = () => {
            if (token) {
                document.getElementById('loginSec').classList.add('hidden');
                document.getElementById('dashSec').classList.remove('hidden');
                document.getElementById('logoutMenu').classList.remove('hidden');
                renderAdminUI();
            }
        };

        function login() {
            token = document.getElementById('ghToken').value;
            if(!token) return;
            localStorage.setItem('s18_token', token);
            window.location.reload();
        }

        function logout() { localStorage.removeItem('s18_token'); window.location.reload(); }
        function showMsg(msg, type) {
            const b = document.getElementById('alertBox');
            b.className = `alert ${type}`; b.innerHTML = msg; window.scrollTo(0,0);
            setTimeout(() => b.classList.add('hidden'), 4000);
        }

        function autoSlug() {
            document.getElementById('vSlug').value = document.getElementById('vTitle').value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        }

        function renderAdminUI() {
            // Render Select & Table Kategori
            const catSelect = document.getElementById('vCat');
            const catBody = document.getElementById('catTableBody');
            catSelect.innerHTML = ''; catBody.innerHTML = '';
            
            localDB.categories.forEach(c => {
                catSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                catBody.innerHTML += `<tr><td>${c.id}</td><td>${c.name}</td>
                    <td>
                        <button class="action-btn" onclick="editCat('${c.id}', '${c.name}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn del" onclick="delCat('${c.id}')"><i class="fas fa-trash"></i></button>
                    </td></tr>`;
            });

            // Render Table Video
            const vidBody = document.getElementById('vidTableBody');
            vidBody.innerHTML = '';
            localDB.videos.forEach(v => {
                const cName = localDB.categories.find(c => c.id === v.categoryId)?.name || v.categoryId;
                vidBody.innerHTML += `<tr><td>${v.title}</td><td>${cName}</td>
                    <td>
                        <button class="action-btn" onclick="editVid('${v.id}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn del" onclick="delVid('${v.id}')"><i class="fas fa-trash"></i></button>
                    </td></tr>`;
            });
        }

        // --- CRUD KATEGORI ---
        function saveCategory() {
            const id = document.getElementById('cId').value;
            const name = document.getElementById('cName').value;
            const editId = document.getElementById('editCatId').value;
            if(!id || !name) return showMsg("ID dan Nama wajib isi", "error");

            if(editId) {
                const idx = localDB.categories.findIndex(c => c.id === editId);
                localDB.categories[idx] = {id, name};
            } else {
                localDB.categories.push({id, name});
            }
            document.getElementById('cId').value = ''; document.getElementById('cName').value = ''; document.getElementById('editCatId').value = '';
            renderAdminUI(); showMsg("Kategori disiapkan sementara. Ingat klik Push!", "success");
        }
        function editCat(id, name) { document.getElementById('cId').value = id; document.getElementById('cName').value = name; document.getElementById('editCatId').value = id; }
        function delCat(id) { localDB.categories = localDB.categories.filter(c => c.id !== id); renderAdminUI(); }

        // --- CRUD VIDEO ---
        function saveVideo() {
            const id = document.getElementById('editVidId').value || Date.now().toString();
            const vid = {
                id: id,
                title: document.getElementById('vTitle').value,
                slug: document.getElementById('vSlug').value,
                categoryId: document.getElementById('vCat').value,
                url: document.getElementById('vUrl').value,
                thumbnail: document.getElementById('vThumb').value,
                desc: document.getElementById('vDesc').value,
                dateAdded: document.getElementById('editVidId').value ? localDB.videos.find(v=>v.id===id).dateAdded : Date.now()
            };
            if(!vid.title || !vid.url) return showMsg("Judul dan URL wajib isi!", "error");

            if(document.getElementById('editVidId').value) {
                const idx = localDB.videos.findIndex(v => v.id === id);
                localDB.videos[idx] = vid;
            } else {
                localDB.videos.unshift(vid); // Taruh atas
            }
            
            // Reset Form
            ['editVidId','vTitle','vSlug','vUrl','vThumb','vDesc'].forEach(i => document.getElementById(i).value = '');
            renderAdminUI(); showMsg("Video disiapkan sementara. Ingat klik Push!", "success");
        }
        function editVid(id) {
            const v = localDB.videos.find(x => x.id === id);
            document.getElementById('editVidId').value = v.id;
            document.getElementById('vTitle').value = v.title;
            document.getElementById('vSlug').value = v.slug;
            document.getElementById('vCat').value = v.categoryId;
            document.getElementById('vUrl').value = v.url;
            document.getElementById('vThumb').value = v.thumbnail;
            document.getElementById('vDesc').value = v.desc;
            window.scrollTo(0,0);
        }
        function delVid(id) { localDB.videos = localDB.videos.filter(v => v.id !== id); renderAdminUI(); }

        // --- GITHUB API PUSH ---
        const b64EncodeUnicode = str => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
        
        async function pushToGitHub() {
            const btn = document.getElementById('btnPush');
            btn.innerHTML = "Memproses... Mohon tunggu"; btn.disabled = true;
            try {
                // 1. Get current SHA of database.js
                const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/database.js?ref=${BRANCH}`, {
                    headers: {"Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json"}
                });
                if(!getRes.ok) throw new Error("Gagal mengambil file database dari repo.");
                const fileData = await getRes.json();

                // 2. Prepare new content
                const newContent = "const streamDB = " + JSON.stringify(localDB, null, 4) + ";";

                // 3. Push File
                const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/database.js`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Admin Update Content",
                        content: b64EncodeUnicode(newContent),
                        sha: fileData.sha,
                        branch: BRANCH
                    })
                });
                if(!putRes.ok) throw new Error("Gagal Commit ke GitHub. Cek izin Token PAT Anda.");
                
                showMsg("Berhasil! Perubahan telah Live di Website.", "success");
            } catch(e) {
                showMsg(e.message, "error");
            } finally {
                btn.innerHTML = "🚀 COMMIT & PUSH KE REPO"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
