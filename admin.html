<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - STREAM 18</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header id="main-header">
        <a href="/index" class="logo">STREAM 18</a>
        <div class="header-right">
            <button id="hamburger-btn" class="hamburger-btn">&#9776;</button>
        </div>
    </header>

    <div id="overlay" class="overlay"></div>
    <aside id="sidebar" class="sidebar">
        <button id="close-btn" class="close-btn">&times;</button>
        <h3>Navigasi</h3>
        <ul>
            <li><a href="/index">Beranda</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/privacy">Privacy Policy</a></li>
            <li><a href="/admin" class="active">Admin Panel</a></li>
        </ul>
    </aside>

    <main>
        <div id="admin-alert" class="alert"></div>

        <section id="login-section" class="admin-container" style="display: block;">
            <h2 class="section-title">Login Admin</h2>
            <div class="form-group">
                <label>GitHub Personal Access Token</label>
                <input type="password" id="token-input" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <button id="btn-login" class="btn" style="width: 100%;">Masuk & Simpan</button>
        </section>

        <section id="admin-panel" style="display: none;">
            
            <div class="admin-container" style="margin-bottom: 30px;">
                <h2 class="section-title">Posting Video Baru</h2>
                <form id="post-form">
                    <div class="form-group">
                        <label>Judul Video</label>
                        <input type="text" id="vid-title" class="form-control" placeholder="Contoh: Konser Reggae 2026">
                        <small style="color: var(--text-muted);">Slug: <span id="vid-slug-preview"></span>.html</small>
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <input type="text" id="vid-category" class="form-control" placeholder="Musik, Action, dll">
                    </div>
                    <div class="form-group">
                        <label>URL Embed / Video URL</label>
                        <input type="text" id="vid-embed" class="form-control" placeholder="https://www.youtube.com/embed/xxx atau link .mp4">
                    </div>
                    <div class="form-group">
                        <label>URL Thumbnail</label>
                        <input type="text" id="vid-thumb" class="form-control" placeholder="https://image.com/thumb.jpg">
                    </div>
                    <button type="button" id="btn-publish" class="btn">Publish Ke GitHub</button>
                </form>
            </div>

            <div class="admin-container" style="margin-bottom: 30px; border: 1px solid var(--warning-yellow);">
                <h2 class="section-title" style="color: var(--warning-yellow);">Pengaturan Domain</h2>
                <div class="form-group">
                    <label>Domain Lama</label>
                    <input type="text" id="old-domain" class="form-control" value="stream18.musikanywhere.online" readonly>
                </div>
                <div class="form-group">
                    <label>Domain Baru</label>
                    <input type="text" id="new-domain" class="form-control" placeholder="domain-baru.com">
                </div>
                <button id="btn-change-domain" class="btn" style="background: var(--warning-yellow); color: #000;">Ganti Massal (Beta)</button>
            </div>

            <div class="admin-container">
                <h2 class="section-title">Kelola Konten</h2>
                <table class="table-admin">
                    <thead>
                        <tr>
                            <th>Judul</th>
                            <th>Kategori</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-video-list">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 STREAM 18. Hak Cipta Dilindungi.</p>
    </footer>

    <script src="database.js"></script>
    <script src="assets/js/admin.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
