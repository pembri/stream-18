
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - STREAM 18</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Admin Specific Styles */
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface-color);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: var(--accent-color); }
        .btn-action {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-action:hover { background: var(--accent-hover); }
        
        /* Auth Overlay */
        #authOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .tab-menu { display: flex; gap: 20px; border-bottom: 1px solid #333; margin-bottom: 30px; }
        .tab-link { padding: 10px 0; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
        .tab-link.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- Header Identik -->
    <header id="mainHeader">
        <a href="/" class="logo">STREAM 18</a>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" placeholder="Search admin tools...">
        </div>
        <div class="nav-actions">
            <div class="hamburger" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <!-- Overlay Menu Identik -->
    <nav class="menu-overlay" id="menuOverlay">
        <ul>
            <li><a href="/"><i class="fas fa-home"></i> Beranda</a></li>
            <li><a href="/admin"><i class="fas fa-user-shield"></i> Admin Panel</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Auth Login -->
    <div id="authOverlay" style="display: none;">
        <h2 style="margin-bottom: 20px;">STREAM 18 LOGIN</h2>
        <div style="width: 300px;">
            <input type="password" id="githubToken" placeholder="GitHub Personal Access Token">
            <button class="btn-action" id="loginBtn" style="width: 100%; margin-top: 15px;">LOGIN</button>
        </div>
    </div>

    <main>
        <div class="admin-container">
            <div class="tab-menu">
                <div class="tab-link active" data-tab="post-video">Post Video</div>
                <div class="tab-link" data-tab="settings">Pengaturan Site</div>
                <div class="tab-link" data-tab="manage-content">Kelola Konten</div>
            </div>

            <!-- Tab: Post Video -->
            <div id="post-video" class="tab-content active">
                <div class="form-group">
                    <label>Judul Video</label>
                    <input type="text" id="videoTitle" placeholder="Contoh: Spider-Man No Way Home">
                </div>
                <div class="form-group">
                    <label>Kategori (Pilih atau Tulis Baru)</label>
                    <input type="text" id="videoCategory" placeholder="Action, Horror, etc.">
                </div>
                <div class="form-group">
                    <label>Embed URL Video (YouTube, Dailymotion, etc.)</label>
                    <input type="text" id="videoEmbed" placeholder="https://www.youtube.com/embed/...">
                </div>
                <div class="form-group">
                    <label>URL Thumbnail</label>
                    <input type="text" id="videoThumb" placeholder="https://image.url/poster.jpg">
                </div>
                <button class="btn-action" id="publishBtn"><i class="fas fa-paper-plane"></i> PUBLISH KE GITHUB</button>
            </div>

            <!-- Tab: Settings -->
            <div id="settings" class="tab-content">
                <div class="form-group">
                    <label>Ubah Domain URL (Base URL)</label>
                    <input type="text" id="baseUrlInput" placeholder="pembri.github.io/stream-18 atau domain.com">
                    <p style="font-size: 0.8rem; color: #777; margin-top: 5px;">*Ini akan memperbarui referensi URL di seluruh file repo via API.</p>
                </div>
                <button class="btn-action" id="updateDomainBtn">UPDATE DOMAIN</button>
            </div>

            <!-- Tab: Manage -->
            <div id="manage-content" class="tab-content">
                <p>Fitur Edit/Hapus sedang sinkronisasi dengan database.js...</p>
                <div id="adminVideoList" style="margin-top: 20px;"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="/admin">Admin</a>
        </div>
        <p class="copyright">&copy; 2026 STREAM 18. Admin Control Panel.</p>
    </footer>

    <script src="database.js"></script>
    <script>
        // Logika Tab
        document.querySelectorAll('.tab-link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.tab-link, .tab-content').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(link.dataset.tab).classList.add('active');
            });
        });

        // Logika Hamburger Identik
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        menuToggle.addEventListener('click', () => {
            menuOverlay.classList.toggle('active');
            const spans = menuToggle.querySelectorAll('span');
            spans[0].style.transform = menuOverlay.classList.contains('active') ? 'rotate(45deg) translate(5px, 5px)' : 'none';
            spans[1].style.opacity = menuOverlay.classList.contains('active') ? '0' : '1';
            spans[2].style.transform = menuOverlay.classList.contains('active') ? 'rotate(-45deg) translate(7px, -6px)' : 'none';
        });

        // Logika Auth GitHub
        const token = localStorage.getItem('gh_token');
        if(!token) document.getElementById('authOverlay').style.display = 'flex';
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            const val = document.getElementById('githubToken').value;
            if(val) {
                localStorage.setItem('gh_token', val);
                location.reload();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('gh_token');
            location.reload();
        });

        // Slug Generator
        function generateSlug(text) {
            return text.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        }

        // Logic Publish Video (Akan memanggil GitHub API)
        // Note: Ini membutuhkan konfigurasi repository pembri/stream-18
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const title = document.getElementById('videoTitle').value;
            const category = document.getElementById('videoCategory').value;
            const embed = document.getElementById('videoEmbed').value;
            const thumb = document.getElementById('videoThumb').value;
            const slug = generateSlug(title);

            if(!title || !embed) return alert("Isi data dengan lengkap!");

            alert("Proses Publish ke GitHub API sedang berjalan... (Membuat file: content_video/" + category + "/" + slug + ".html)");
            // Di sini nanti diletakkan fungsi fetch(GITHUB_API_URL) 
            // untuk membuat file HTML dan mengupdate database.js
        });
    </script>
</body>
</html>
