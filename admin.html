<!DOCTYPE html> 
<html lang="id"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Admin Dashboard - STREAM 18</title> 
    <link rel="stylesheet" href="/assets/css/style.css"> 
    <style> 
        .admin-box { max-width: 900px; margin: 30px auto; padding: 25px; background: #111; border: 1px solid #333; border-radius: 8px; } 
        .admin-box h2 { color: var(--primary-red); margin-bottom: 20px; border-bottom: 2px solid var(--primary-red); display: inline-block; } 
        .form-group { margin-bottom: 15px; } 
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; } 
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; outline: none; } 
        input:focus { border-color: var(--primary-red); } 
        .btn-group { display: flex; gap: 10px; margin-top: 20px; } 
        .btn-main { background: var(--primary-red); color: white; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; flex: 1; } 
        .btn-sec { background: #333; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; } 
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; display: flex; align-items: center; justify-content: center; } 
        .hidden { display: none !important; } 
        #statusLog { margin-top: 15px; font-size: 0.9rem; color: #ffcc00; } 
    </style> 
</head> 
<body> 
 
    <!-- Overlay Login --> 
    <div id="loginOverlay" class="login-screen"> 
        <div class="admin-box" style="width: 400px; text-align: center;"> 
            <h2 style="border:none;">ADMIN ACCESS</h2> 
            <p style="margin-bottom:20px; color:#666;">Masukkan GitHub Personal Access Token</p> 
            <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxx"> 
            <button class="btn-main" style="margin-top:20px;" onclick="saveToken()">MASUK</button> 
        </div> 
    </div> 
 
    <main class="container"> 
        <!-- Form Post Video --> 
        <div class="admin-box"> 
            <h2>Post Video Baru</h2> 
            <div id="statusLog"></div> 
             
            <div class="form-group"> 
                <label>Judul Video</label> 
                <input type="text" id="videoTitle" placeholder="Contoh: Film Action Terbaru 2026" oninput="updateSlugPreview()"> 
                <small id="slugDisplay" style="color:#555;">Slug: /...</small> 
            </div> 
 
            <div class="form-group"> 
                <label>Kategori</label> 
                <div style="display:flex; gap:10px;"> 
                    <select id="videoCategorySelect"></select> 
                    <input type="text" id="newCategoryInput" placeholder="Atau ketik kategori baru..." style="flex:1;"> 
                </div> 
            </div> 
 
            <div class="form-group"> 
                <label>Embed URL (Semua Provider)</label> 
                <input type="text" id="videoEmbed" placeholder="https://www.youtube.com/embed/xxx atau provider lain"> 
            </div> 
 
            <div class="form-group"> 
                <label>Thumbnail URL</label> 
                <input type="text" id="videoThumb" placeholder="https://image.com/poster.jpg"> 
            </div> 
 
            <button class="btn-main" id="publishBtn" onclick="handlePublish()">PUBLISH KE GITHUB</button> 
        </div> 
 
        <!-- Pengaturan Domain --> 
        <div class="admin-box"> 
            <h2>Pengaturan Situs</h2> 
            <div class="form-group"> 
                <label>Ubah Domain Utama (CNAME)</label> 
                <input type="text" id="domainInput" placeholder="stream18.musikanywhere.online"> 
            </div> 
            <button class="btn-sec" onclick="updateSiteDomain()">Update Domain & CNAME</button> 
            <button class="btn-sec" onclick="logoutAdmin()" style="margin-left:10px; color:red;">Logout</button> 
        </div> 
    </main> 
 
    <script src="/database.js"></script> 
    <script src="/assets/js/admin.js"></script> 
</body> 
</html>
