<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - STREAM 18</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { color: var(--accent-color); font-weight: bold; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; margin-right: 5px; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <main>
        <div class="admin-container">
            <h1 class="section-title">Dashboard Admin</h1>
            <p style="margin-bottom: 30px; color: var(--text-secondary);">Kelola konten dan konfigurasi website STREAM 18 Anda.</p>

            <div class="admin-section">
                <h2>Pengaturan Domain Global</h2>
                <div class="form-group">
                    <label for="targetDomain">URL Domain Baru</label>
                    <input type="text" id="targetDomain" placeholder="contoh: stream18.musikanywhere.online">
                </div>
                <button class="btn-publish" onclick="updateGlobalDomain()">Update Domain</button>
            </div>

            <div class="admin-section" id="formSection">
                <h2 id="formTitle">Posting Video Baru</h2>
                <input type="hidden" id="vId" value="">
                <input type="hidden" id="vOldSlug" value="">
                
                <div class="form-group">
                    <label for="vTitle">Judul Video</label>
                    <input type="text" id="vTitle" placeholder="Masukkan judul video lengkap">
                </div>

                <div class="form-group">
                    <label for="vCategory">Kategori (Ketik baru atau pilih yang ada)</label>
                    <input type="text" id="vCategory" list="existingCategories" placeholder="Contoh: Action, VLOG, dll" autocomplete="off">
                    <datalist id="existingCategories"></datalist>
                </div>

                <div class="form-group">
                    <label for="vThumb">URL Thumbnail (Image)</label>
                    <input type="text" id="vThumb" placeholder="https://link-gambar.com/foto.jpg">
                </div>

                <div class="form-group">
                    <label for="vEmbed">Embed URL Video</label>
                    <textarea id="vEmbed" rows="3" placeholder="Masukkan URL Embed Video"></textarea>
                </div>
                
                <button id="btnPublish" class="btn-publish" onclick="saveVideo()">Publish Video Sekarang</button>
                <button id="btnCancel" class="btn-publish" style="display:none; background:#555; margin-top:10px;" onclick="cancelEdit()">Batal Edit</button>
            </div>

            <div class="admin-section">
                <h2>Kelola Video</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Judul</th>
                                <th>Kategori</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="adminVideoList">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="/database.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
